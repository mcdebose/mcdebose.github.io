<!--Tags describing the document and language of the document-->

<!DOCTYPE html>
<html lang="en">

    <!-- Head where file's data is stored, including CSS for style, javascript for password validation-->

    <head>
        <meta charset="UTF-8">
        <Title>Patient Registration Form</Title>
        <link rel="stylesheet" href="patient-form-style2.css">
        <script src="assignment2pvalidate.js" defer></script> 
    </head>

    <!-- Body of the file where text and inputs are displayed-->
    
    <body>
     
       
    <!-- The header of the form, which includes the title, time/date, image, and a container for styling purposes-->
     
        <header>
            <div class="container header">
                <h1>Asclepius Health</h1>
                <img src="aesculapian-staff-305434_1280.png" alt="Rod of Asclepius" width="100" height="100">
            </div>
                <p id="datetime" align="center"></p> 

        </header>
        
    <!--The main content of the form with a container for styling purposes -->
    
<main>
    <div class="container">
        
        <!-- The form element that contains all the input fields and labels for the patient registration form-->
        
        <form id="patientForm" action="patient-form-thankyou2.html" method="get"> <!--Submits the form to the server and redirects to thank you page-->

            <!-- Patient identification information-->

            <h2>Identification</h2>
            <hr> <br>
 
            <br><label for = "pusername">Username</label>
            <input type = "text" id = "pusername" name = "pusername" size = "20" minlength="5" maxlength="30" pattern="[A-Za-z0-9_\-]+" required 
            title="Username should only contain letters, numbers, hyphens, or underscores and be between 5 and 30 characters long." 
            oninput="this.value = this.value.toLowerCase().replace(/\s/g, '')""><br> <!--Converts input to lowercase and removes spaces.-->

            <br><label for = "ppassword">Password</label>
            <input type = "password" id = "ppassword" name = "ppassword" size = "20" minlength="5" 
            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#%^&*()\-=_+/><\\])[A-Za-z\d!@#%^&*()\-=_+/><\\]+" required 
            title="Password must be at least 5 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character."> <!--Pattern dosent work-->


            <input type="checkbox" id="showpassword" name="showpassword" onclick="togglePasswordVisibility()"> Show Password <br> <!--Not working currently-->

            <br><label for = "cpassword">Confirm Password</label>
            <input type = "password" id = "cpassword" name = "cpassword" size = "20" minlength="5"
            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#%^&*()\-=_+/><\\])[A-Za-z\d!@#%^&*()\-=_+/><\\]+" required 
            title = "Confirm your password."><br><br>

            <span id="match_message" style="display: block; font-size: 0.8em;"></span><br> <!-- Message to show if passwords match or not-->

           
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname" size="20" minlength="2" maxlength="30" pattern="[A-Za-z'\-]+" required 
            title="First name should only contain letters, hyphens, or apostrophes.">

            <label for="minitial">Middle Initial</label>
            <input type="text" id="minitial" name="minitial" size="1" maxlength="1" pattern="[A-Za-z]" 
            title="Middle initial should be a single letter.">

            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname" size="20" minlength="2" maxlength="30" pattern="[A-Za-z' \-]+" required 
            title="Last name should only contain letters, hyphens, apostrophes,and spaces.">
            

            <br><br><label for = "dob">Date of Birth</label> 
            <input type = "date" id = "dob" name = "dob" min="1900-01-01" max="2026-12-31"><br> <!--Hardcoded dates, consdier dynamic dates.-->
        
            <br><label for = "snumber">Social Security</label>
            <input type = "password" id = "snumber" name = "snumber" placeholder="XXX-XX-XXXX" maxlength="11"pattern="^\d{3}-\d{2}-\d{4}$" 
            title="9-digit SSN (e.g., 000-00-0000)"
            required><br><br>

            <br><u><b><label for = "gender">Gender</label></b><br><br></u>
            
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label> 
            
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label><br>
            
            
            <!--Patient contact information-->

            <br><h2>Contact Information</h2>
            <hr> 

            <br><label for = "phone" >Phone Number</label>
            <input type = "tel" id = "phone" name = "phone" placeholder="713-981-5307" pattern="^\d{3}-\d{3}-\d{4}$" 
            title="Phone number should be in the format XXX-XXX-XXXX" required><br>

            <br><label for = "email">Email Address</label>
            <input type = "email" id = "email" name = "email" placeholder="example@domain.com" required><br>

            <!-- Patient location information-->

            <br><h2>Location </h2>
            <hr> 

            <br><label for = "address1">Address Line 1</label>
            <input type = "text" id = "address1" name = "address1" minlength="2" maxlength="30" required><br>

            <br><label for = "address2">Address Line 2</label>
            <input type = "text" id = "address2" name = "address2" minlength="2" maxlength="30"><br>

            <br><label for = "city">City</label> 
            <input type = "text" id = "city" name = "city" minlength = "2" maxlength="30" required>
            
            <label for = "state">State</label>
            <select id = "state" name = "state">
                <option value = "AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="PR">Puerto Rico</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option></select>

            <label for="zcode">Zip Code</label>
            <input type="text" id="zcode" name="zcode" placeholder="" minlength="5" maxlength="10" required><br>

            <!-- Patient Medical Information-->

                <br><h2>Medical Information</h2>
                <hr> 

            <br><label for="pheight">Height (inches)</label>
            &nbsp;0&nbsp;<input type="range" id="pheight" name="pheight" min="0" max="100" value="50" oninput="updateValue(this.value)">&nbsp;100<br>
            <span id="heightValue">50 </span><br>
               

            <br><label for="pweight">Weight (pounds)</label>
            <input type="number" id="pweight" name="pweight" min="0" max="1000"><br>

            <br><label for = "btype">Blood Type</label>
            <select id = "btype" name = "btype">
                <option value = "A+">A+</option>
                <option value = "A-">A-</option>
                <option value = "B+">B+</option>
                <option value = "B-">B-</option>
                <option value = "AB+">AB+</option>
                <option value = "AB-">AB-</option>
                <option value = "O+">O+</option>
                <option value = "O-">O-</option></select><br><br>

            <br><u><b><label for = "hprovider">Healthcare Provider</label></b></u></b><br><br>
                <input type="radio" id="hprovider1" name="hprovider" value="United Healthcare">
                <label for="hprovider1">United Healthcare</label>
                <input type="radio" id="hprovider2" name="hprovider" value="Elevance Health">
                <label for="hprovider2">Elevance Health</label>
                <input type="radio" id="hprovider3" name="hprovider" value="CVS Health">  
                <label for="hprovider3">CVS Health</label>
                 <input type="radio" id="hprovider4" name="hprovider" value="Centene">
                <label for="hprovider4">Centene</label>
                <input type="radio" id="hprovider5" name="hprovider" value="Humana">
                <label for="hprovider5">Humana</label>
                <input type="radio" id="hproviders6" name="hprovider" value="Other">
                <label for="hprovider6">Other</label>
                <br><br><label for = "hproviderother">If other, please specify:</label>
                <input type = "text" id = "hproviderother" name = "hproviderother"><br><br>

            <b><u><br><label for = "pallergies">Allergies</label></u></b><br><br>             
                <input type="checkbox" id="pallergies1" name="pallergies" value="Peanuts">
                <label for="pallergies1">Peanuts</label>
                <input type="checkbox" id="pallergies2" name="pallergies" value="Shellfish">
                <label for="pallergies2">Shellfish</label>
                <input type="checkbox" id="pallergies3" name="pallergies" value="Dairy">
                <label for="pallergies3">Dairy</label>
                <input type="checkbox" id="pallergies4" name="pallergies" value="Gluten">
                <label for="pallergies4">Gluten</label>
                <input type="checkbox" id="pallergies5" name="pallergies" value="Pollen">
                <label for="pallergies5">Pollen</label>
                <input type="checkbox" id="pallergies6" name="pallergies" value="Other">
                <label for="pallergies6">Other</label><br><br>
                <label for="pallergiesother">If other, please specify:</label>
                <input type="text" id="pallergiesother" name="pallergiesother" maxlength="30"><br><br><br>
                
                
            <b><u><label for = "ppreviousinfections">Have you had any infections in the last 6 months?</label></u></b><br><br>
                <input type="radio" id="ppreviousinfections1" name="ppreviousinfections" value="Yes">
                <label for="ppreviousinfections1">Yes</label>
                <input type="radio" id="ppreviousinfections2" name="ppreviousinfections" value="No">
                <label for="ppreviousinfections2">No</label><br><br><br>
                

                
            <b><u><label for = "ainfo">Additional Information</label><br><br></b></u>
                <textarea id = "ainfo" name = "ainfo" rows = "4" cols = "50" placeholder="Enter any additional information here..."></textarea><br>

                   

            <br><label for = "Submit"></label>
                <input type = "submit" id = "Submit" name = "Submit" value = "Submit">
                <label for = "reset"></label>
                <input type = "reset" id = "reset" name = "reset" value = "Reset"> 
                <label for = "Getdata"></label> <!-- Consider adding scrolling to the bottom of the page to view the data outputted from the form.-->
                <input type = "button" id = "Getdata" name = "Getdata" value = "Get Data" onclick="getData()"><br><br>
        </form>

        </div>
        </main>

            <!--Footer where company contact information is stored with container for styling-->

        <footer>
            <div class="container footer">
                <button id="contactbtn">Contact Us</button>
                <div>
                    <span>Asclecpius Health</span><br>
                    <small>2500 West End Ave, Nashville, TN 37203</small>
                </div>
            </div>
        </footer>
